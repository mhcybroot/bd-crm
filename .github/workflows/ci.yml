name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 21 + Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify Maven project
        working-directory: bd-crm
        run: mvn -v

      - name: Compile
        working-directory: bd-crm
        run: mvn clean compile -q

      - name: Run unit tests
        working-directory: bd-crm
        run: mvn test -Dtest=BdCrmApplicationTests -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: bd-crm/target/surefire-reports/
          retention-days: 7

  frontend:
    name: Frontend (Node 20 + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/test-results/
          retention-days: 7

  ci:
    name: CI Status
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: CI completed
        run: echo "Backend and Frontend CI jobs completed"