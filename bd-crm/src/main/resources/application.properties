spring.application.name=bd-crm
server.error.include-message=always

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bd_crm}
spring.datasource.username=${DB_USERNAME:mhcybroot}
spring.datasource.password=${DB_PASSWORD:MhR@2025}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

crm.security.bootstrap-password=${CRM_BOOTSTRAP_PASSWORD:password}
crm.security.jwt-secret=${CRM_JWT_SECRET:change-me-change-me-change-me-change-me}
crm.security.jwt-expiration-minutes=${CRM_JWT_EXPIRATION_MINUTES:720}
crm.escalation.threshold-days=${CRM_ESCALATION_THRESHOLD_DAYS:2}
crm.cors.allowed-origins=${CRM_ALLOWED_ORIGINS:http://localhost:5173}

spring.jackson.serialization.write-dates-as-timestamps=false
